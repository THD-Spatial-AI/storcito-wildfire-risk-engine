# Serves Cesium quantized-mesh terrain tiles for CesiumTerrainProvider.
# .terrain tiles are stored gzip-compressed, so we advertise Content-Encoding:
# gzip and disable nginx's own gzip. CORS is open so the browser can fetch them.
server {
    listen 8000;
    root /data/tilesets;
    gzip off;

    location / {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files $uri =404;
    }

    # Quantized-mesh tiles (gzip on disk).
    location ~ \.terrain$ {
        add_header Access-Control-Allow-Origin * always;
        add_header Content-Encoding gzip always;
        default_type application/octet-stream;
        try_files $uri =404;
    }

    # Manifest.
    location ~ layer\.json$ {
        add_header Access-Control-Allow-Origin * always;
        default_type application/json;
        try_files $uri =404;
    }
}
